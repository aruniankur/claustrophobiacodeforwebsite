<!DOCTYPE html>
<html>

<head>
<title>ESP32 ClaustroPhobia Sensor Monitor</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #e8ecf4;
        min-height: 100vh;
        padding: 16px;
    }

    .container {
        background: #f0f3f8;
        border-radius: 14px;
        padding: 20px 24px 24px;
        max-width: 1380px;
        margin: 0 auto;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    /* ── Page header ── */
    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }

    .page-header h1 {
        font-size: 20px;
        font-weight: 700;
        color: #1e2a3a;
        letter-spacing: 0.2px;
    }

    /* ── Status ── */
    .status {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 13px;
        border-radius: 20px;
        background: #e8edf5;
        color: #999;
    }

    .status.connected {
        background: #d4edda;
        color: #28a745;
    }

    .status.disconnected {
        background: #f8d7da;
        color: #dc3545;
    }

    /* ── Sensor strip ── */
    .sensor-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin-bottom: 14px;
    }

    .sensor-card {
        background: white;
        border: 1.5px solid #dde3ed;
        border-radius: 10px;
        padding: 14px 10px 12px;
        text-align: center;
        box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        transition: box-shadow 0.2s, border-color 0.2s;
    }

    .sensor-card:hover {
        border-color: #667eea;
        box-shadow: 0 4px 14px rgba(102,126,234,0.18);
    }

    .sensor-card.unreal {
        background: #f4f0ff;
        border-color: #9b7de8;
        grid-column: auto;
    }

    .sensor-card.unreal .sensor-label {
        color: #7c4dcc;
    }

    .sensor-card.unreal .sensor-value {
        color: #7c4dcc;
        font-size: 22px;
    }

    .sensor-label {
        color: #98a3b5;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 6px;
    }

    .sensor-value {
        color: #667eea;
        font-size: 22px;
        font-weight: 700;
        line-height: 1;
    }

    /* ── Two-column layout ── */
    .main-layout {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 14px;
        align-items: start;
    }

    .left-column,
    .right-column {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    /* ── Panel boxes ── */
    .panel-box {
        background: white;
        border: 1.5px solid #dde3ed;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .panel-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: #667eea;
        margin-bottom: 14px;
        padding-bottom: 8px;
        border-bottom: 1.5px solid #edf0f7;
    }

    /* ── Input controls ── */
    .input-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 14px;
    }

    .input-row {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .input-row label {
        color: #6b7589;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-row select {
        width: 100%;
        padding: 8px 10px;
        border: 1.5px solid #dde3ed;
        border-radius: 7px;
        font-size: 13px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f8f9fc;
        color: #2d3748;
        cursor: pointer;
        transition: border-color 0.2s;
    }

    .input-row select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
    }

    .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .input-row input[type="range"] {
        flex: 1;
        cursor: pointer;
        accent-color: #667eea;
    }

    .value-display {
        min-width: 30px;
        text-align: center;
        font-size: 12px;
        font-weight: 700;
        color: #667eea;
        background: #eef1fb;
        padding: 2px 6px;
        border-radius: 5px;
        flex-shrink: 0;
    }

    /* ── Send button ── */
    .button-group {
        display: flex;
        gap: 10px;
    }

    button {
        flex: 1;
        padding: 11px 16px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    #triggerBtn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 3px 10px rgba(102,126,234,0.3);
    }

    #triggerBtn:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 16px rgba(102,126,234,0.45);
    }

    #triggerBtn:active {
        transform: translateY(0);
    }

    #triggerBtn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    /* ── Send history ── */
    .last-sent-values {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 300px;
        overflow-y: auto;
        padding-right: 2px;
    }

    .last-sent-values::-webkit-scrollbar { width: 4px; }
    .last-sent-values::-webkit-scrollbar-track { background: #f0f2f7; border-radius: 4px; }
    .last-sent-values::-webkit-scrollbar-thumb { background: #c8cfde; border-radius: 4px; }

    .sent-entry {
        border: 1.5px solid #e8edf5;
        border-radius: 8px;
        padding: 8px 10px;
        background: #f8f9fc;
    }

    .sent-entry-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 7px;
    }

    .sent-entry-title {
        font-size: 11px;
        color: #667eea;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    .sent-entry-time {
        font-size: 11px;
        color: #8a96ab;
        font-weight: 600;
    }

    .sent-entry-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 4px 8px;
    }

    .sent-metric {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #8a96ab;
        border-bottom: 1px dashed #dde3ed;
        padding-bottom: 3px;
    }

    .sent-metric span:last-child {
        color: #2d3748;
        font-weight: 700;
    }

    .last-sent-placeholder {
        color: #b0bac9;
        font-size: 13px;
        text-align: center;
        padding: 16px 0;
    }

    /* ── Chart area ── */
    .chart-section { margin-bottom: 0; }

    .chart-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
        background: white;
        border: 1.5px solid #dde3ed;
        border-radius: 10px;
        padding: 10px 14px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .chart-header h2 {
        color: #3d4a5c;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        flex: 1;
        margin: 0;
    }

    .window-selector {
        display: flex;
        align-items: center;
        gap: 7px;
    }

    .window-selector label {
        font-size: 11px;
        color: #8a96ab;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    .window-selector select {
        padding: 5px 9px;
        border: 1.5px solid #dde3ed;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        color: #3d4a5c;
        background: #f8f9fc;
        cursor: pointer;
        transition: border-color 0.2s;
    }

    .window-selector select:focus {
        outline: none;
        border-color: #667eea;
    }

    .live-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 11px;
        border-radius: 20px;
        background: #d4edda;
        color: #28a745;
        transition: all 0.3s;
        white-space: nowrap;
    }

    .live-badge.paused {
        background: #f0f0f0;
        color: #aaa;
    }

    .chart-wrapper {
        background: white;
        border: 1.5px solid #dde3ed;
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 10px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .chart-wrapper canvas {
        width: 100% !important;
        height: 130px !important;
    }

    .scroll-bar-section {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 2px;
        margin-bottom: 4px;
    }

    .scroll-label {
        font-size: 11px;
        color: #b0bac9;
        white-space: nowrap;
    }

    #scrollBar {
        flex: 1;
        height: 5px;
        cursor: pointer;
        accent-color: #667eea;
    }

    #backToLiveBtn {
        display: none;
        padding: 7px 14px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
        width: 100%;
        letter-spacing: 0.5px;
        flex: none;
    }

    #backToLiveBtn:hover { background: #5568d3; }

    /* ── Responsive ── */
    @media (max-width: 1150px) {
        .sensor-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 900px) {
        .container { padding: 14px; }
        .main-layout { grid-template-columns: 1fr; }
        .sensor-grid { grid-template-columns: repeat(2, 1fr); }
    }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>

<body>

<div class="container">
    <div class="page-header">
        <h1>ESP32 Sensor Monitor</h1>
        <div class="status" id="status">● Connecting...</div>
    </div>

    <div class="main-layout">
        <div class="left-column">
            <div class="panel-box">
                <div class="panel-title">Control Panel</div>
                <div class="input-section">
                    <div class="input-row">
                        <label>Language</label>
                        <select id="input1">
                            <option value="1">English</option>
                            <option value="2">Hindi</option>
                            <option value="3">Bengali</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>Size</label>
                        <div class="slider-row">
                            <input type="range" id="input2" min="60" max="120" value="80" oninput="updateVal('input2','val2')" />
                            <div class="value-display" id="val2">80</div>
                        </div>
                    </div>
                    <div class="input-row">
                        <label>Time</label>
                        <div class="slider-row">
                            <input type="range" id="input3" min="5" max="20" value="10" oninput="updateVal('input3','val3')" />
                            <div class="value-display" id="val3">10</div>
                        </div>
                    </div>
                    <div class="input-row">
                        <label>Intensity</label>
                        <div class="slider-row">
                            <input type="range" id="input4" min="40" max="80" value="60" oninput="updateVal('input4','val4')" />
                            <div class="value-display" id="val4">60</div>
                        </div>
                    </div>
                </div>
                <div class="button-group">
                    <button id="triggerBtn" onclick="sendTrigger()">Send All to ESP32</button>
                </div>
            </div>

            <div class="panel-box">
                <div class="panel-title">Previous Sent Value</div>
                <div id="lastSentValues" class="last-sent-placeholder">No values sent yet.</div>
            </div>
        </div>

        <div class="right-column">
            <div class="sensor-grid">
                <div class="sensor-card">
                    <div class="sensor-label">IR</div>
                    <div class="sensor-value" id="ir">--</div>
                </div>
                <div class="sensor-card">
                    <div class="sensor-label">RED</div>
                    <div class="sensor-value" id="red">--</div>
                </div>
                <div class="sensor-card">
                    <div class="sensor-label">BPM</div>
                    <div class="sensor-value" id="bpm">--</div>
                </div>
                <div class="sensor-card">
                    <div class="sensor-label">Finger Detected</div>
                    <div class="sensor-value" id="finger">--</div>
                </div>
                <div class="sensor-card unreal">
                    <div class="sensor-label">&#11041; Unreal Value</div>
                    <div class="sensor-value" id="unreal_value">--</div>
                </div>
            </div>

            <div class="chart-section">
                <div class="chart-header">
                    <h2 id="chartTitle">Live Charts</h2>
                    <div class="window-selector">
                        <label>Window:</label>
                        <select id="windowSize" onchange="changeWindow()">
                            <option value="15">15 sec</option>
                            <option value="30">30 sec</option>
                            <option value="60">1 min</option>
                            <option value="120" selected>2 min</option>
                            <option value="300">5 min</option>
                            <option value="600">10 min</option>
                        </select>
                    </div>
                    <span id="liveIndicator" class="live-badge">● LIVE</span>
                </div>
                <div class="chart-wrapper">
                    <canvas id="chartIR"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="chartRED"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="chartBPM"></canvas>
                </div>
                <div class="scroll-bar-section">
                    <span class="scroll-label">◀ Older</span>
                    <input type="range" id="scrollBar" min="0" max="0" value="0" />
                    <span class="scroll-label">Newer ▶</span>
                </div>
                <button id="backToLiveBtn" onclick="backToLive()">↩ Back to Live</button>
            </div>
        </div>
    </div>
</div>

<script>

let isServerConnected = false;
const sendHistory = [];
let historySignature = "";
let isSendingNow = false;

const languageMap = {
    1: "English",
    2: "Hindi",
    3: "Bengali"
};

function updateVal(inputId, displayId) {
    document.getElementById(displayId).textContent = document.getElementById(inputId).value;
}

function formatStamp(isoText) {
    if (!isoText) return "--";
    const parsed = new Date(isoText);
    if (Number.isNaN(parsed.getTime())) return isoText;
    return parsed.toLocaleString();
}

// ── Chart config ──────────────────────────────────────────────
const POLL_MS = 200;
let WINDOW_PTS = (2 * 60 * 1000) / POLL_MS;  // default: 600 pts = 2 min

// Master arrays — never trimmed, hold all history
const allLabels = [];
const allIR     = [];
const allRED    = [];
const allBPM    = [];

let scrollLocked = true;   // true = auto-follow live edge

function updateTitle() {
    const sec = parseInt(document.getElementById("windowSize").value);
    const label = sec >= 60 ? `${sec / 60} min` : `${sec} sec`;
    document.getElementById("chartTitle").textContent = `Live Charts — ${label} window`;
}

function changeWindow() {
    const sec = parseInt(document.getElementById("windowSize").value);
    WINDOW_PTS = (sec * 1000) / POLL_MS;
    
    updateTitle();
    
    // Recalculate scrollbar max
    const bar = document.getElementById("scrollBar");
    const maxScroll = Math.max(0, allLabels.length - WINDOW_PTS);
    bar.max = maxScroll;
    
    if (scrollLocked) {
        bar.value = maxScroll;
        redrawCharts(maxScroll);
    } else {
        // Keep proportional position
        const ratio = bar.value / (bar.max || 1);
        bar.value = Math.floor(ratio * maxScroll);
        redrawCharts(parseInt(bar.value));
    }
}

function makeChart(canvasId, label, color) {
    const ctx = document.getElementById(canvasId).getContext("2d");
    return new Chart(ctx, {
        type: "line",
        data: { labels: [], datasets: [{ label, data: [],
            borderColor: color, backgroundColor: color + "22",
            borderWidth: 2, pointRadius: 0, tension: 0.3, fill: true }] },
        options: {
            animation: false, responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: "#555", font: { size: 12 } } } },
            scales: {
                x: { ticks: { maxTicksLimit: 6, color: "#888", font: { size: 11 } }, grid: { color: "#eee" } },
                y: { ticks: { color: "#888", font: { size: 11 } }, grid: { color: "#eee" } }
            }
        }
    });
}

const chartIR  = makeChart("chartIR",  "IR",  "#667eea");
const chartRED = makeChart("chartRED", "RED", "#e74c3c");
const chartBPM = makeChart("chartBPM", "BPM", "#27ae60");

function redrawCharts(startIdx) {
    const endIdx = Math.min(startIdx + WINDOW_PTS, allLabels.length);
    const labels = allLabels.slice(startIdx, endIdx);
    const irSlice  = allIR.slice(startIdx, endIdx);
    const redSlice = allRED.slice(startIdx, endIdx);
    const bpmSlice = allBPM.slice(startIdx, endIdx);

    [chartIR, chartRED, chartBPM].forEach((ch, i) => {
        ch.data.labels = labels;
        ch.data.datasets[0].data = [irSlice, redSlice, bpmSlice][i];
        ch.update("none");
    });
}

function addDataPoint(ir, red, bpm) {
    const now = new Date();
    allLabels.push(now.toLocaleTimeString());
    allIR.push(ir);
    allRED.push(red);
    allBPM.push(bpm);

    const total    = allLabels.length;
    const maxScroll = Math.max(0, total - WINDOW_PTS);

    const bar = document.getElementById("scrollBar");
    bar.max = maxScroll;

    if (scrollLocked) {
        bar.value = maxScroll;
        redrawCharts(maxScroll);
    }
    // if not locked, don't touch bar.value — user is scrolling history
}

// Scrollbar interaction
document.getElementById("scrollBar").addEventListener("input", function () {
    const maxScroll = parseInt(this.max);
    const val       = parseInt(this.value);
    scrollLocked = (val >= maxScroll);

    document.getElementById("liveIndicator").className =
        "live-badge" + (scrollLocked ? "" : " paused");
    document.getElementById("backToLiveBtn").style.display =
        scrollLocked ? "none" : "block";

    redrawCharts(val);
});

function backToLive() {
    scrollLocked = true;
    const bar = document.getElementById("scrollBar");
    bar.value = bar.max;
    document.getElementById("liveIndicator").className = "live-badge";
    document.getElementById("backToLiveBtn").style.display = "none";
    redrawCharts(parseInt(bar.max));
}
// ─────────────────────────────────────────────────────────────

async function updateData() {
    try {
        const res = await fetch("/data");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        document.getElementById("ir").innerText = data.ir;
        document.getElementById("red").innerText = data.red;
        document.getElementById("bpm").innerText = data.bpm;
        document.getElementById("finger").innerText = data.finger ? "Yes" : "No";
        document.getElementById("unreal_value").innerText = (data.unreal_value !== undefined) ? data.unreal_value : "--";

        if (Array.isArray(data.sent_history)) {
            const newSignature = JSON.stringify(data.sent_history);
            if (newSignature !== historySignature) {
                historySignature = newSignature;
                syncSendHistory(data.sent_history);
                renderSentHistory();
            }
        }

        updateTriggerButtonState(data.capture_in_progress, data.capture_remaining_sec);

        addDataPoint(data.ir, data.red, data.bpm);

        isServerConnected = true;
        setStatus(Boolean(data.esp32_connected), data.sensor_age_sec);
    } catch (err) {
        console.error("Fetch error:", err);
        isServerConnected = false;
        setStatus(false, null, true);
    }
}

function setStatus(espConnected, sensorAgeSec = null, serverOffline = false) {
    const el = document.getElementById("status");

    if (serverOffline) {
        el.textContent = "● Server Offline";
        el.className = "status disconnected";
        return;
    }

    if (espConnected) {
        if (sensorAgeSec !== null) {
            el.textContent = `● ESP32 Connected (${sensorAgeSec}s)`;
        } else {
            el.textContent = "● ESP32 Connected";
        }
        el.className = "status connected";
    } else {
        el.textContent = "● ESP32 Disconnected";
        el.className = "status disconnected";
    }
}

function updateTriggerButtonState(captureInProgress, remainingSec) {
    const btn = document.getElementById("triggerBtn");
    if (isSendingNow) {
        btn.disabled = true;
        btn.textContent = "Sending...";
        return;
    }

    if (captureInProgress) {
        btn.disabled = true;
        btn.textContent = `Capture Running (${remainingSec || 0}s)`;
        return;
    }

    btn.disabled = false;
    btn.textContent = "Send All to ESP32";
}

function renderLastSentValues(v1, v2, v3, v4) {
    // Backend now stores history; we keep this function as a no-op for compatibility.
}

function syncSendHistory(serverHistory) {
    sendHistory.length = 0;
    serverHistory.forEach(item => {
        sendHistory.push({
            id: item.id,
            language: languageMap[item.msg1] || `${item.msg1}`,
            size: `${item.msg2}`,
            time: `${item.msg3}`,
            intensity: `${item.msg4}`,
            sentAt: item.sent_at,
            captureComplete: Boolean(item.capture_complete),
            samples: item.samples || 0
        });
    });
}

function renderSentHistory() {
    const holder = document.getElementById("lastSentValues");

    if (!sendHistory.length) {
        holder.className = "last-sent-placeholder";
        holder.textContent = "No values sent yet.";
        return;
    }

    holder.className = "last-sent-values";
    holder.innerHTML = sendHistory.map((entry, idx) => `
        <div class="sent-entry">
            <div class="sent-entry-head">
                <span class="sent-entry-title">Send #${entry.id}</span>
                <span class="sent-entry-time">${formatStamp(entry.sentAt)}</span>
            </div>
            <div class="sent-entry-grid">
                <div class="sent-metric"><span>Language</span><span>${entry.language}</span></div>
                <div class="sent-metric"><span>Size</span><span>${entry.size}</span></div>
                <div class="sent-metric"><span>Time</span><span>${entry.time}</span></div>
                <div class="sent-metric"><span>Intensity</span><span>${entry.intensity}</span></div>
                <div class="sent-metric"><span>Capture</span><span>${entry.captureComplete ? "Done" : "Running"}</span></div>
                <div class="sent-metric"><span>Samples</span><span>${entry.samples}</span></div>
            </div>
            <div style="margin-top:8px; text-align:right;">
                <a href="/analytic?id=${entry.id}" style="font-size:12px; font-weight:700; color:#5568d3; text-decoration:none;">View More</a>
            </div>
        </div>
    `).join("");
}

function loadSendHistory() {
    // Backend history is fetched in updateData().
    renderSentHistory();
}

async function sendTrigger() {
    const v1 = parseInt(document.getElementById("input1").value);  // language: 1/2/3
    const v2 = document.getElementById("input2").value;
    const v3 = document.getElementById("input3").value;
    const v4 = document.getElementById("input4").value;

    isSendingNow = true;
    updateTriggerButtonState(false, 0);

    try {
        const res = await fetch("/trigger", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ msg1: v1, msg2: parseInt(v2), msg3: parseInt(v3), msg4: parseInt(v4) })
        });

        if (res.status === 409) {
            const busyData = await res.json();
            alert(`Capture in progress. Wait ${busyData.remaining_sec || 0}s`);
            return;
        }

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        console.log("Trigger response:", data);
        await updateData();
        alert("Sent to ESP32!");
    } catch (err) {
        console.error("Trigger error:", err);
        alert("Failed to send!");
    } finally {
        isSendingNow = false;
        await updateData();
    }
}

setInterval(updateData, 500);
updateData();
updateTitle();
loadSendHistory();

</script>

</body>
